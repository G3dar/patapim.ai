name = "patapim-ai"
main = "dist/_worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "d5e2374c14ca5e3c166e84f47265f5cd"

routes = [
  { pattern = "patapim.ai/*", zone_name = "patapim.ai" },
  { pattern = "www.patapim.ai/*", zone_name = "patapim.ai" }
]

[assets]
directory = "./dist"

[vars]
SITE_URL = "https://patapim.ai"

[[kv_namespaces]]
binding = "LICENSES"
id = "241dd65cb1a94944b3b3ea870d28f372"

[[kv_namespaces]]
binding = "FEEDBACK"
id = "5a9c98b6432343bfbee7404add18c8f3"

# Auth sessions KV — create with: wrangler kv namespace create SESSIONS
# Then fill in the id below
[[kv_namespaces]]
binding = "SESSIONS"
id = "99d2f45febe345dd96dc07e2edd631b0"

[[r2_buckets]]
binding = "RELEASES"
bucket_name = "patapim-releases"

# Google OAuth secrets — set with:
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
# For local dev, create .dev.vars with GOOGLE_CLIENT_ID=... and GOOGLE_CLIENT_SECRET=...

# Discord bot for auto-rotating the public invite link.
# Secrets: wrangler secret put DISCORD_BOT_TOKEN  (and DISCORD_CHANNEL_ID)
# Cron rotates the invite weekly so /discord always points to a fresh code.
[triggers]
crons = ["0 6 * * 1"]  # Mondays 06:00 UTC

# Telegram official bot (@iampatapimbot) — zero-setup remote for PATAPIM.
# Secrets:
#   wrangler secret put TELEGRAM_BOT_TOKEN       (from @BotFather)
#   wrangler secret put TELEGRAM_WEBHOOK_SECRET  (any random string; also passed to setWebhook as secret_token)
# After deploy:
#   curl "https://api.telegram.org/bot<TOKEN>/setWebhook?url=https://patapim.ai/api/telegram/webhook&secret_token=<SECRET>&allowed_updates=%5B%22message%22%2C%22callback_query%22%5D"
#   (allowed_updates is the URL-encoded JSON array ["message","callback_query"];
#    without callback_query, inline-button taps on planReady prompts won't be delivered.)
[[durable_objects.bindings]]
name = "TELEGRAM_INSTANCE"
class_name = "TelegramInstance"

[[migrations]]
tag = "v1-telegram-instance"
new_sqlite_classes = ["TelegramInstance"]

# Workers AI binding — used to transcribe Telegram voice messages on the fly
# (Whisper). Free tier covers ~10K voice msgs/day. No API key needed.
[ai]
binding = "AI"
